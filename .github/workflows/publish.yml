name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 发布前验证 ──────────────────────────────────────────────────────
  pre-publish-check:
    name: Pre-publish Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Verify built-in Skills
      run: |
        node -e "
          const fs = require('fs');
          const path = require('path');
          const skillsDir = path.join(process.cwd(), 'skills');
          if (!fs.existsSync(skillsDir)) { console.error('❌ skills/ 目录不存在'); process.exit(1); }
          const skills = fs.readdirSync(skillsDir).filter(n => fs.statSync(path.join(skillsDir, n)).isDirectory());
          if (skills.length < 8) { console.error('❌ Skills 数量不足：' + skills.length); process.exit(1); }
          console.log('✅ 内置 Skills：' + skills.length + ' 个');
        "

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

  # ── 发布到 npm ──────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: pre-publish-check
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Verify package version matches tag
      run: |
        PKG_VERSION="v$(node -p "require('./package.json').version")"
        TAG_VERSION="${GITHUB_REF_NAME}"
        echo "package.json 版本：$PKG_VERSION"
        echo "Tag 版本：$TAG_VERSION"
        if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
          echo "❌ 版本不一致"
          exit 1
        fi
        echo "✅ 版本一致"

    - name: Publish to npm
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body: |
          ## 安装

          ```bash
          npm install -g openyida
          ```

          安装后即可在 Claude Code / OpenCode / Aone Copilot 中直接使用，零配置。

          ## 更新日志

          请查看 [CHANGELOG](https://github.com/openyida/openyida/commits/main) 了解详情。
        generate_release_notes: true
