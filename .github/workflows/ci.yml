name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 单元测试与代码质量 ──────────────────────────────────────────────
  test:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Sync Skills from yida-skills
      run: node scripts/prepublish.js

    - name: Verify built-in Skills
      run: |
        echo "📦 验证内置 Skills..."
        node -e "
          const fs = require('fs');
          const path = require('path');
          const skillsDir = path.join(process.cwd(), 'skills');
          if (!fs.existsSync(skillsDir)) { console.error('❌ skills/ 目录不存在'); process.exit(1); }
          const skills = fs.readdirSync(skillsDir).filter(n => fs.statSync(path.join(skillsDir, n)).isDirectory());
          console.log('✅ 内置 Skills：' + skills.length + ' 个');
          skills.forEach(s => console.log('  - ' + s));
        "

    - name: Validate JavaScript syntax
      run: |
        node --check bin/yida.js
        node --check scripts/postinstall.js
        node -e "
          const fs = require('fs');
          const path = require('path');
          const skillsDir = path.join(process.cwd(), 'skills');
          const skills = fs.readdirSync(skillsDir).filter(n => fs.statSync(path.join(skillsDir, n)).isDirectory());
          skills.forEach(skill => {
            const scriptsDir = path.join(skillsDir, skill, 'scripts');
            if (!fs.existsSync(scriptsDir)) return;
            fs.readdirSync(scriptsDir).filter(f => f.endsWith('.js')).forEach(f => {
              require('child_process').execSync('node --check ' + JSON.stringify(path.join(scriptsDir, f)), { stdio: 'pipe' });
            });
          });
          console.log('✅ 所有 JS 文件语法检查通过');
        "

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Run tests with coverage (ubuntu only)
      if: matrix.os == 'ubuntu-latest'
      run: npm run test:coverage
